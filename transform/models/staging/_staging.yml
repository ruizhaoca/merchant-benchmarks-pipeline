version: 2

models:
  - name: stg_orders
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: order_status
        tests:
          - accepted_values:
              arguments:
                values:
                  - created
                  - approved
                  - invoiced
                  - processing
                  - shipped
                  - delivered
                  - canceled
                  - unavailable

  # Composite-key uniqueness (order_id, order_item_id) is covered by the
  # singular test in tests/assert_order_items_unique.sql
  - name: stg_order_items
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: item_price
        tests: [not_null]

  - name: stg_order_payments
    columns:
      - name: order_id
        tests: [not_null]
      - name: payment_type
        tests:
          - accepted_values:
              arguments:
                values: [credit_card, boleto, voucher, debit_card, not_defined]

  - name: stg_order_reviews
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: review_score
        tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]
                quote: false

  - name: stg_products
    columns:
      - name: product_id
        tests: [unique, not_null]

  - name: stg_sellers
    columns:
      - name: seller_id
        tests: [unique, not_null]

  - name: stg_customers
    columns:
      - name: customer_id
        tests: [unique, not_null]
